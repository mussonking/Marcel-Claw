packages:
  - .
  - ui
  - packages/*
  - extensions/*

minimumReleaseAge: 0

minimumReleaseAgeExclude:
  - "acpx"
  - "tokenjuice"
  - "@agentclientprotocol/sdk"
  - "axios"
  - "basic-ftp"
  - "hono"
  - "openclaw"
  - "protobufjs"
  - "vite"
  - "@cloudflare/workers-types"
  - "@hono/node-server"
  - "@mariozechner/*"
  - "@openai/codex"
  - "@openai/codex-*"
  - "@typescript/native-preview*"
  - "@types/node"
  - "@rolldown/*"
  - "@oxlint/*"
  - "@oxfmt/*"
  - "axios@1.15.0"
  - "discord-api-types"
  - "rolldown"
  - "sqlite-vec"
  - "sqlite-vec-*"
  # Marcel-Claw: bypass minimumReleaseAge for AWS SDK (amazon-bedrock extension is excluded from build but workspace install pulls deps).
  - "@aws-sdk/*"
  # Marcel-Claw: typebox is heavily used and AWS-style fresh releases keep tripping the 2880min gate on local rebases.
  - "typebox"

onlyBuiltDependencies:
  - "@discordjs/opus"
  - "@google/genai"
  - "@lydell/node-pty"
  - "@matrix-org/matrix-sdk-crypto-nodejs"
  - "@napi-rs/canvas"
  - "@tloncorp/api"
  - "@whiskeysockets/baileys"
  - authenticate-pam
  - esbuild
  - node-llama-cpp
  - protobufjs
  - sharp

ignoredBuiltDependencies:
  - koffi
